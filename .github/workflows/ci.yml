name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Backend ──────────────────────────────────────────────
  backend-lint:
    name: Backend · lint + type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check app tests
      - run: black --check app tests
      - run: mypy app

  backend-test:
    name: Backend · unit + integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: cinebot
          POSTGRES_PASSWORD: cinebot
          POSTGRES_DB: cinebot_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://cinebot:cinebot@localhost:5432/cinebot_test
      SYNC_DATABASE_URL: postgresql://cinebot:cinebot@localhost:5432/cinebot_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-not-for-prod
      LLM_PROVIDER: ollama
      TMDB_API_KEY: fake
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m spacy download en_core_web_sm
      - run: pytest -v --cov=app --cov-report=xml --cov-fail-under=80
      - uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false

  # ── Frontend ─────────────────────────────────────────────
  frontend:
    name: Frontend · lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci || npm install
      - run: npm run lint
      - run: npm test
      - run: npm run build

  # ── Security ─────────────────────────────────────────────
  security:
    name: Security · deps + image scan
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Python dep audit
        run: |
          pip install pip-audit
          cd backend && pip-audit --strict || true

      - name: npm audit
        run: cd frontend && npm audit --audit-level=high || true

      - name: Build API image
        run: docker build -t cinebot-api:ci backend

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: cinebot-api:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
