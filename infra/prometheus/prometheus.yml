global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local
    service: cinebot

scrape_configs:
  - job_name: cinebot-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          component: api

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
